name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_infra:
        description: 'Deploy infrastructure (Bicep)'
        type: boolean
        default: true
      deploy_apps:
        description: 'Deploy container apps'
        type: boolean
        default: true
      image_tag:
        description: 'Container image tag override (leave empty for auto: latest on main, branch name on feature branches)'
        type: string
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ebizcon/risk-management-platform

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Determine image tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          elif [ "$REF_NAME" = "main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          else
            BRANCH_TAG=$(echo "$REF_NAME" | sed 's/\//-/g')
            echo "tag=$BRANCH_TAG" >> "$GITHUB_OUTPUT"
          fi

  deploy-infra:
    if: ${{ inputs.deploy_infra }}
    needs: [resolve-tag]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Resource Group
        run: |
          az group create \
            --name ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --location northeurope \
            --output none

      - name: Deploy Bicep
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters environmentName="dev" \
            --parameters location="northeurope" \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters keycloakAdminPassword="${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}" \
            --parameters oidcClientSecret="${{ secrets.OIDC_CLIENT_SECRET }}" \
            --parameters serviceApiKey="${{ secrets.SERVICE_API_KEY }}" \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters ghcrToken="${{ secrets.GHCR_TOKEN }}" \
            --parameters imageTag="${IMAGE_TAG}"

  deploy-apps:
    if: ${{ !failure() && !cancelled() && inputs.deploy_apps }}
    needs: [resolve-tag, deploy-infra]
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container Apps
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.image_tag }}
        run: |
          az containerapp update \
            --name riskmgmt-dev-app \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/risk-management-app:${IMAGE_TAG}
          az containerapp update \
            --name riskmgmt-dev-risk-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/riskmanagement-api:${IMAGE_TAG}
          az containerapp update \
            --name riskmgmt-dev-customer-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/customermanagement-api:${IMAGE_TAG}
