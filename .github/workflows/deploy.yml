name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push frontend
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/risk-management-app:${{ github.sha }} \
                       -t ${{ secrets.ACR_LOGIN_SERVER }}/risk-management-app:latest \
                       -f src/frontend/Dockerfile src/frontend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/risk-management-app:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/risk-management-app:latest

      - name: Build and push risk-api
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/riskmanagement-api:${{ github.sha }} \
                       -t ${{ secrets.ACR_LOGIN_SERVER }}/riskmanagement-api:latest \
                       -f src/backend/RiskManagement.Api/Dockerfile src/backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/riskmanagement-api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/riskmanagement-api:latest

      - name: Build and push customer-api
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/customermanagement-api:${{ github.sha }} \
                       -t ${{ secrets.ACR_LOGIN_SERVER }}/customermanagement-api:latest \
                       -f src/backend/CustomerManagement.Api/Dockerfile src/backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/customermanagement-api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/customermanagement-api:latest

  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters keycloakAdminPassword="${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}" \
            --parameters serviceApiKey="${{ secrets.SERVICE_API_KEY }}" \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters oidcClientSecret="${{ secrets.OIDC_CLIENT_SECRET }}"

  deploy-apps:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-infra]
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Frontend
        run: |
          az containerapp update \
            --name riskmgmt-dev-app \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/risk-management-app:${{ github.sha }}

      - name: Update Risk API
        run: |
          az containerapp update \
            --name riskmgmt-dev-risk-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/riskmanagement-api:${{ github.sha }}

      - name: Update Customer API
        run: |
          az containerapp update \
            --name riskmgmt-dev-customer-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/customermanagement-api:${{ github.sha }}
