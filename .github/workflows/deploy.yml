name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_infra:
        description: 'Deploy infrastructure (Bicep)'
        type: boolean
        default: true
      deploy_apps:
        description: 'Deploy container apps'
        type: boolean
        default: true
      image_tag:
        description: 'Container image tag to deploy'
        type: string
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ebizcon/risk-management-platform

jobs:
  deploy-infra:
    if: ${{ inputs.deploy_infra }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure Resource Group
        run: |
          az group create \
            --name ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --location northeurope \
            --output none

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters environmentName="dev" \
            --parameters location="northeurope" \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters keycloakAdminPassword="${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}" \
            --parameters oidcClientSecret="${{ secrets.OIDC_CLIENT_SECRET }}" \
            --parameters serviceApiKey="${{ secrets.SERVICE_API_KEY }}" \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters ghcrToken="${{ secrets.GHCR_TOKEN }}"

  deploy-apps:
    if: ${{ !failure() && !cancelled() && inputs.deploy_apps }}
    needs: [deploy-infra]
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          auth-type: SERVICE_PRINCIPAL
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container Apps
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          az containerapp update \
            --name riskmgmt-dev-app \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/risk-management-app:${IMAGE_TAG}
          az containerapp update \
            --name riskmgmt-dev-risk-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/riskmanagement-api:${IMAGE_TAG}
          az containerapp update \
            --name riskmgmt-dev-customer-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/customermanagement-api:${IMAGE_TAG}
