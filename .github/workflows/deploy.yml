name: Deploy

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/risk-management-app:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/risk-management-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Risk API
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/RiskManagement.Api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/riskmanagement-api:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/riskmanagement-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Customer API
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/CustomerManagement.Api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/customermanagement-api:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/customermanagement-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Database Seeder
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend
          file: ./src/backend/DatabaseSeeder/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/databaseseeder:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/databaseseeder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters postgresAdminPassword="${{ secrets.POSTGRES_ADMIN_PASSWORD }}" \
            --parameters keycloakAdminPassword="${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}" \
            --parameters oidcClientSecret="${{ secrets.OIDC_CLIENT_SECRET }}" \
            --parameters serviceApiKey="${{ secrets.SERVICE_API_KEY }}" \
            --parameters rabbitmqPassword="${{ secrets.RABBITMQ_PASSWORD }}" \
            --parameters sessionSecret="${{ secrets.SESSION_SECRET }}"

  deploy-apps:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-infra]
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container Apps
        run: |
          az containerapp update \
            --name riskmgmt-dev-frontend \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/risk-management-app:${{ github.sha }}
          az containerapp update \
            --name riskmgmt-dev-risk-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/riskmanagement-api:${{ github.sha }}
          az containerapp update \
            --name riskmgmt-dev-customer-api \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/customermanagement-api:${{ github.sha }}
