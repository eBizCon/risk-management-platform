name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://localhost:5432/dummy
      OIDC_ISSUER: http://localhost:8081/realms/risk-management
      OIDC_CLIENT_ID: risk-management-app
      OIDC_REDIRECT_URI: http://localhost:5173/auth/callback
      OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:5173
      OIDC_SCOPE: openid profile email
      OIDC_ROLES_CLAIM_PATH: resource_access.risk-management-app.roles
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check

  test-unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: risk
          POSTGRES_PASSWORD: risk
          POSTGRES_DB: risk_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U risk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://risk:risk@localhost:5432/risk_management_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test

  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://localhost:5432/dummy
      OIDC_ISSUER: http://localhost:8081/realms/risk-management
      OIDC_CLIENT_ID: risk-management-app
      OIDC_REDIRECT_URI: http://localhost:5173/auth/callback
      OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:5173
      OIDC_SCOPE: openid profile email
      OIDC_ROLES_CLAIM_PATH: resource_access.risk-management-app.roles
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
